name: Gitleaks

# Deterministic in-CI secret scanning. Defense-in-depth on top of GitHub's
# native secret-scanning push protection (which is a repo Settings toggle —
# see SECURITY.md for the recommended admin action).
#
# PR runs scan the diff (fast); main pushes scan full history.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history needed for the on-push full-history scan; on PRs the
          # action diffs against the base ref so the cost is bounded by the PR.
          fetch-depth: 0
          # Don't bake the token into the cloned .git/config; downstream
          # steps (and Gitleaks itself) don't need it for repo operations.
          persist-credentials: false

      # Both SHAs must exist locally so the CLI can scan exactly the PR range.
      - name: Fetch PR refs for gitleaks range
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch --no-tags origin "$BASE_SHA"
          git fetch --no-tags origin "$HEAD_SHA"

      # The Gitleaks Action wrapper requires a license for organization-owned
      # repositories. Run the official CLI image directly so secret scanning
      # remains local, deterministic, and independent of an external license.
      - name: Gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          log_opts="--all"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            log_opts="${BASE_SHA}..${HEAD_SHA}"
          fi

          # Gitleaks can otherwise report success after a Git discovery error.
          # Verify a non-empty range inside the same container before scanning.
          docker run --rm \
            --network none \
            --user "$(id -u):$(id -g)" \
            --env GIT_CONFIG_COUNT=1 \
            --env GIT_CONFIG_KEY_0=safe.directory \
            --env GIT_CONFIG_VALUE_0=/repo \
            --volume "$PWD:/repo:ro" \
            --workdir /repo \
            --entrypoint /bin/sh \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            -eu -c '
              range="$1"
              if [ "$range" = "--all" ]; then
                commit_count="$(git rev-list --count --all)"
              else
                commit_count="$(git rev-list --count "$range")"
              fi
              if [ "$commit_count" -eq 0 ]; then
                echo "gitleaks preflight refused an empty commit range" >&2
                exit 2
              fi
              exec gitleaks git --redact --verbose --exit-code 1 --log-opts="$range" .
            ' sh "$log_opts"

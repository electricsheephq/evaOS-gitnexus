name: Release Candidate

on:
  # Validate release-candidate readiness whenever a merge/commit lands on main.
  # Publishing is intentionally not available from this workflow; publish.yml is
  # the single publishing path for npm, GitHub Releases, tags, and Docker images.
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

permissions: {}

# Concurrency convention: see CONTRIBUTING.md -> "GitHub Actions - Concurrency Convention".
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: Check if release candidate validation should run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      head_sha: ${{ steps.decide.outputs.head_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          HEAD_SHA="$(git rev-parse HEAD)"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          HEAD_SUBJECT="$(git log -1 --pretty=%s HEAD)"
          HEAD_SUBJECT_SAFE="${HEAD_SUBJECT//::/__}"
          RELEASE_SUBJECT_RE='^chore:[[:space:]]*release[[:space:]]+v[0-9]+\.[0-9]+\.[0-9]+([[:space:]]+\(#[0-9]+\))?$'
          if [[ "$HEAD_SUBJECT" =~ $RELEASE_SUBJECT_RE ]]; then
            echo "HEAD commit subject matches a release commit - skipping rc validation."
            echo "  subject (sanitised): $HEAD_SUBJECT_SAFE"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$HEAD_SUBJECT" =~ \(#([0-9]+)\)[[:space:]]*$ ]]; then
            PR_NUM="${BASH_REMATCH[1]}"
            echo "Detected squash-merge of PR #$PR_NUM - checking labels."
            if LABELS_JSON="$(gh pr view "$PR_NUM" --repo "$REPO" --json labels 2>/dev/null)"; then
              if printf '%s' "$LABELS_JSON" | jq -e '.labels[] | select(.name == "release")' >/dev/null; then
                echo "PR #$PR_NUM has the 'release' label - skipping rc validation."
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "PR #$PR_NUM has no 'release' label - proceeding."
            else
              echo "::warning::Could not read labels for PR #${PR_NUM} - proceeding with validation."
            fi
          fi

          echo "Release-candidate validation enabled for $EVENT_NAME."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

  ci:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
